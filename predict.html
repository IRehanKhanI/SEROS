<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Usage Predictor | Gemma-3</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --amber-glow: #ff9f1c;
            --yellow-green: #9fd356;
            --scarlet-rush: #df2935;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 900px;
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { 
            color: var(--amber-glow); 
            text-align: center; 
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border: 2px dashed #333;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        input[type="file"] {
            color: #888;
        }

        button {
            background-color: var(--yellow-green);
            color: var(--bg-dark);
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--amber-glow);
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #444;
            cursor: not-allowed;
        }

        #status {
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 24px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .instructions {
            font-size: 0.85rem;
            color: #666;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Electricity Forecaster</h1>
    
    <div class="upload-section">
        <p>Upload 14-day history (.txt or .json)</p>
        <input type="file" id="fileInput" accept=".txt,.json">
        <button id="predictBtn" onclick="processData()">GENERATE PREDICTION</button>
    </div>

    <div id="status">Ready</div>
    
    <div class="chart-container">
        <canvas id="predictionChart"></canvas>
    </div>

    <div class="instructions">
        Target Model: <strong>gemma3:4b</strong> via Ollama
    </div>
</div>

<script>
    let chart;

    async function processData() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const btn = document.getElementById('predictBtn');
        
        if (!fileInput.files[0]) {
            status.innerText = "Error: No file selected";
            status.style.color = "var(--scarlet-rush)";
            return;
        }

        try {
            btn.disabled = true;
            status.innerText = "Reading file...";
            status.style.color = "var(--amber-glow)";

            const text = await fileInput.files[0].text();
            const inputData = JSON.parse(text);
            
            if (!inputData.usage_history || inputData.usage_history.length < 14) {
                throw new Error("JSON must contain at least 14 days of 'usage_history'");
            }

            const historyValues = inputData.usage_history.map(d => d.kwh);
            status.innerText = "Querying Gemma-3:4b...";

            const response = await fetch('http://localhost:11434/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gemma3:4b",
                    prompt: `Context: Last 14 days electricity usage in kWh: [${historyValues.join(", ")}]. 
                             Task: Predict the next 7 days based on the trend.
                             Requirement: Return ONLY a JSON object with a key "predictions" containing 7 numbers.
                             Example: {"predictions": [12.1, 11.5, 13.0, 12.8, 14.2, 13.5, 12.9]}`,
                    stream: false,
                    format: "json"
                })
            });

            if (!response.ok) throw new Error("Ollama connection failed. Check CORS settings.");

            const result = await response.json();
            const aiResponse = JSON.parse(result.response);
            
            // Extract array even if model wraps it differently
            let predictions = aiResponse.predictions || (Array.isArray(aiResponse) ? aiResponse : Object.values(aiResponse)[0]);

            if (!Array.isArray(predictions)) throw new Error("Invalid format returned by model.");

            updateChart(historyValues, predictions.slice(0, 7));
            
            status.innerText = "Prediction Successful";
            status.style.color = "var(--yellow-green)";

        } catch (err) {
            console.error(err);
            status.innerText = "Error: " + err.message;
            status.style.color = "var(--scarlet-rush)";
        } finally {
            btn.disabled = false;
        }
    }

    function updateChart(history, predictions) {
        const ctx = document.getElementById('predictionChart').getContext('2d');
        
        const labels = [];
        for(let i=1; i<=14; i++) labels.push(`Day ${i}`);
        for(let i=1; i<=7; i++) labels.push(`Next Day ${i}`);

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Historical Usage (kWh)',
                        data: [...history, ...Array(7).fill(null)],
                        backgroundColor: '#9fd356',
                        borderColor: '#9fd356',
                        borderWidth: 1
                    },
                    {
                        label: 'Gemma-3 Prediction (kWh)',
                        data: [...Array(14).fill(null), ...predictions],
                        backgroundColor: '#ff9f1c',
                        borderColor: '#ff9f1c',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        ticks: { color: '#aaa' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#aaa' }
                    }
                },
                plugins: {
                    legend: {
                        labels: { color: '#fff', font: { weight: 'bold' } }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
